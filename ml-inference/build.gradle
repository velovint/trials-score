plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'net.yakavenka.mlinference'
    compileSdk 35

    defaultConfig {
        minSdk 26
        targetSdk 35

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        testInstrumentationRunnerArguments clearPackageData: "true"
        consumerProguardFiles "consumer-rules.pro"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    testOptions {
        execution = "ANDROIDX_TEST_ORCHESTRATOR"
    }
}

dependencies {
    // Depend on shared-cv for CardImagePreprocessor
    implementation project(':shared-cv')

    implementation platform("org.jetbrains.kotlin:kotlin-bom:2.3.0")
    implementation "org.jetbrains.kotlin:kotlin-stdlib"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.10.2"

    // OpenCV provided by :shared-cv dependency
    implementation "org.opencv:opencv:4.10.0"

    // TensorFlow Lite (LiteRT) - Version 2.17.0 for FULLY_CONNECTED v12 support
    implementation "org.tensorflow:tensorflow-lite:2.17.0"
    implementation "org.tensorflow:tensorflow-lite-gpu:2.17.0"
    implementation("org.tensorflow:tensorflow-lite-support:0.4.4") {
        exclude group: "org.tensorflow", module: "tensorflow-lite-api"
    }

    // Testing
    testImplementation "junit:junit:4.13.2"
    testImplementation "org.hamcrest:hamcrest-library:3.0"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:1.10.2"

    // Android instrumented tests
    androidTestImplementation "androidx.test.ext:junit:1.2.1"
    androidTestImplementation "androidx.test:runner:1.6.2"
    androidTestImplementation "androidx.test:core:1.6.1"
    androidTestImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:1.10.2"
    androidTestImplementation "org.hamcrest:hamcrest-library:3.0"
    androidTestUtil "androidx.test:orchestrator:1.6.1"
}

// Task to copy downloaded model from build directory to module assets
tasks.register('copyModelToAssets', Copy) {
    group = 'build'
    description = 'Copy downloaded model from build directory to assets'

    def sourceModel = file("${rootProject.buildDir}/ml-models/score_classifier_model.tflite")
    def destDir = file("$projectDir/src/main/assets")

    from sourceModel
    into destDir

    dependsOn rootProject.tasks.named('downloadModel')

    inputs.file(sourceModel)
    outputs.file(new File(destDir, sourceModel.name))

    doFirst {
        if (!sourceModel.exists()) {
            throw new GradleException(
                "Downloaded model not found: ${sourceModel.absolutePath}\n" +
                "Run './gradlew downloadModel' first."
            )
        }
        destDir.mkdirs()
    }
}

// Ensure model is copied to assets before compiling
tasks.named('preBuild') {
    dependsOn tasks.named('copyModelToAssets')
}
